<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forensic Dashboard</title>
<style>
:root {
  --bg:#0b0f14;
  --panel:#121821;
  --card:#161b22;
  --accent:#3b82f6;
  --accent-soft:#1f6feb;
  --danger:#ef4444;
  --text:#e6edf3;
  --muted:#9da7b3;
}

body {
  margin:0;
  font-family: 'Segoe UI', system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

.sidebar {
  width:230px;
  background:linear-gradient(180deg,#0f1720,#0b0f14);
  padding:20px;
  height:100vh;
  border-right:1px solid #1f2937;
}

.sidebar h2 { color:var(--accent); margin-bottom:25px; }

.nav-item {
  padding:10px; border-radius:8px; margin-bottom:8px;
  color:var(--muted); cursor:pointer; transition:0.2s;
}
.nav-item:hover { background:#1a2330; color:var(--accent); }

.main { flex:1; padding:30px; }
.header { font-size:26px; margin-bottom:20px; font-weight:600; }

.card {
  background:var(--card); padding:18px; border-radius:14px;
  margin-bottom:15px; box-shadow:0 5px 20px rgba(0,0,0,0.4);
}
.card:hover { transform:translateY(-2px); transition:0.2s; }

input, select {
  width:100%; padding:10px; margin:6px 0;
  background:#0d1117; border:1px solid #1f2937;
  border-radius:8px; color:white;
}

button {
  padding:8px 14px; border:none; border-radius:8px;
  cursor:pointer; transition:0.2s;
}
button:hover { opacity:0.9; }

.add { background:var(--accent-soft); color:white; }
.close { background:var(--danger); color:white; }
.hidden { display:none; }

.timeline { border-left:3px solid #1f2937; padding-left:15px; }
.stage {
  padding:12px; margin-bottom:12px; background:#0d1117;
  border-radius:10px; position:relative;
}
.stage::before {
  content:''; position:absolute; left:-22px; top:15px;
  width:10px; height:10px; background:var(--accent);
  border-radius:50%;
}

.gallery { display:flex; flex-wrap:wrap; }
.evidence-card {
  background:#0d1117; padding:10px; border-radius:10px;
  margin:6px; width:130px; transition:0.2s;
}
.evidence-card:hover { transform:scale(1.05); }
.evidence-card img {
  width:100%; height:90px; object-fit:cover;
  border-radius:6px; cursor:pointer;
}

.tag {
  margin-top:5px; padding:3px 6px;
  background:var(--accent-soft); border-radius:4px;
  font-size:11px;
}

/* Custom Upload Button */
.file-upload {
  display:flex; align-items:center; gap:10px;
}
.file-upload input { display:none; }

.upload-btn {
  background:linear-gradient(135deg,var(--accent),var(--accent-soft));
  color:white; padding:10px 16px; border-radius:10px;
  cursor:pointer; font-weight:500;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
}
.upload-btn:hover { transform:translateY(-1px); }

.file-name {
  font-size:13px; color:var(--muted);
}

/* Zoom Viewer */
#viewer {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.92);
  display:none; justify-content:center; align-items:center;
  z-index:999;
}
#viewer img {
  max-width:90%; max-height:90%; border-radius:10px;
}
#viewer span {
  position:absolute; top:20px; right:30px;
  font-size:28px; cursor:pointer;
}
</style>
</head>
<body>

<div class="sidebar">
<h2>🧪 Forensic UI</h2>
<div class="nav-item" onclick="showPage('cases')">📂 Cases</div>
<div class="nav-item" onclick="showPage('timeline')">🧬 Decomposition</div>
<div class="nav-item" onclick="showPage('evidence')">📸 Evidence</div>
</div>

<div class="main">

<div id="casesPage">
<div class="header">Case Management</div>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">

<div class="card">
<h3>Add Case</h3>
<input id="caseName" placeholder="Case Name">
<input id="caseDetails" placeholder="Details">
<select id="caseStage">
<option value="Fresh">Fresh</option>
<option value="Bloat">Bloat</option>
<option value="Active">Active</option>
<option value="Advanced">Advanced</option>
<option value="Skeleton">Skeleton</option>
</select>
<button class="add" onclick="addCase()">Add Case</button>
</div>

<div class="card">
<h3>Cases</h3>
<div id="caseList"></div>
</div>

</div>
</div>

<div id="timelinePage" class="hidden">
<div class="header">Decomposition Timeline</div>
<div class="timeline">
<div class="stage"><strong>Fresh</strong> • 0–2 Days</div>
<div class="stage"><strong>Bloat</strong> • 2–6 Days</div>
<div class="stage"><strong>Active</strong> • 5–11 Days</div>
<div class="stage"><strong>Advanced</strong> • 10–25 Days</div>
<div class="stage"><strong>Skeleton</strong> • 25+ Days</div>
</div>
<div class="card">
<h3>Selected Case</h3>
<div id="selectedCase">None selected</div>
</div>
</div>

<div id="evidencePage" class="hidden">
<div class="header">Evidence</div>

<div class="card">
<div class="file-upload">
<label class="upload-btn">
  Upload Images
  <input type="file" accept="image/*" multiple onchange="handleUpload(event)">
</label>
<div id="fileName" class="file-name">No files chosen</div>
</div>
</div>

<div class="card">
<div id="gallery" class="gallery"></div>
</div>

</div>

<div id="viewer">
<span onclick="closeViewer()">✖</span>
<img id="viewerImg">
</div>

<script>
let currentCaseId = null;

// NAVIGATION
function showPage(p){
  ['casesPage','timelinePage','evidencePage'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById(p+'Page').classList.remove('hidden');
}

// LOAD CASES FROM SERVER
async function loadCases(){
  const res = await fetch('/cases');
  const data = await res.json();

  caseList.innerHTML='';

  data.forEach(c=>{
    const div=document.createElement('div');
    div.className='card';

    div.innerHTML=`
      <strong>${c.name}</strong>
      <p>${c.details}</p>
      <p>${c.stage}</p>
      <button onclick="openCase('${c.id}')">View</button>
      <button class='close' onclick="deleteCase('${c.id}')">Close</button>
    `;

    caseList.appendChild(div);
  });
}

// ADD CASE (BACKEND)
async function addCase(){
  const name=caseName.value;
  const details=caseDetails.value;
  const stage=caseStage.value;

  if(!name) return;

  await fetch('/add-case',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,details,stage})
  });

  caseName.value='';
  caseDetails.value='';

  loadCases();
}

// OPEN CASE
async function openCase(id){
  currentCaseId = id;

  const res = await fetch('/case/'+id);
  const c = await res.json();

  selectedCase.innerHTML=`
    <strong>${c.name}</strong><br>
    ${c.stage}<br>
    ${c.details}
  `;

  // LOAD EVIDENCE FROM SERVER
  gallery.innerHTML='';

  c.evidence.forEach((e,i)=>{
    let w=document.createElement('div');
    w.className='evidence-card';

    let img=document.createElement('img');
    img.src=e.url;
    img.onclick=()=>openViewer(e.url);

    let sel=document.createElement('select');
    sel.innerHTML=`<option>Blood</option><option>Scene</option><option>Weapon</option><option>Body</option>`;
    sel.value = e.tag || "Blood";

    let tag=document.createElement('div');
    tag.className='tag';
    tag.textContent='Tag: '+(e.tag || "None");

    sel.onchange=async ()=>{
      tag.textContent='Tag: '+sel.value;

      await fetch('/tag',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          caseId:currentCaseId,
          index:i,
          tag:sel.value
        })
      });
    };

    w.append(img,sel,tag);
    gallery.appendChild(w);
  });

  showPage('timeline');
}

// DELETE CASE (optional but fixes your close button)
async function deleteCase(id){
  alert("Delete not implemented yet (can add if you want)");
}

// UPLOAD FILES (TO SERVER)
async function handleUpload(e){
  const files=e.target.files;

  document.getElementById('fileName').textContent =
    files.length + ' file(s) selected';

  if(!currentCaseId){
    alert("Open a case first");
    return;
  }

  const form = new FormData();
  for(let f of files){
    form.append("images",f);
  }

  await fetch('/upload/'+currentCaseId,{
    method:"POST",
    body:form
  });

  openCase(currentCaseId);
}

// VIEWER
function openViewer(s){
  viewer.style.display='flex';
  viewerImg.src=s;
}

function closeViewer(){
  viewer.style.display='none';
}

// INIT
window.onload = ()=>{
  showPage('cases');
  loadCases();
};
</script>

</div>
</body>
</html>
