<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forensic Dashboard</title>

<style>
/* SAME STYLES (UNCHANGED) */
:root {
  --bg:#0b0f14;
  --panel:#121821;
  --card:#161b22;
  --accent:#3b82f6;
  --accent-soft:#1f6feb;
  --danger:#ef4444;
  --text:#e6edf3;
  --muted:#9da7b3;
}
body {margin:0;font-family:'Segoe UI';background:var(--bg);color:var(--text);display:flex;}
.sidebar {width:230px;background:#0f1720;padding:20px;height:100vh;}
.nav-item {padding:10px;margin:5px 0;color:var(--muted);cursor:pointer;}
.nav-item:hover {color:var(--accent);}
.main {flex:1;padding:30px;}
.card {background:var(--card);padding:15px;border-radius:10px;margin-bottom:10px;}
.hidden {display:none;}
.gallery {display:flex;flex-wrap:wrap;}
.evidence-card img {width:120px;height:90px;object-fit:cover;cursor:pointer;}
#viewer {position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:black;}
#viewer img {max-width:90%;}
</style>
</head>

<body>

<div class="sidebar">
<h2>🧪 Forensic UI</h2>
<div class="nav-item" onclick="showPage('cases')">📂 Cases</div>
<div class="nav-item" onclick="showPage('timeline')">🧬 Decomposition</div>
<div class="nav-item" onclick="showPage('evidence')">📸 Evidence</div>
</div>

<div class="main">

<!-- CASES -->
<div id="casesPage">
<div class="header">Case Management</div>

<div class="card">
<input id="caseName" placeholder="Case Name">
<input id="caseDetails" placeholder="Details">
<select id="caseStage">
<option value="Fresh">Fresh</option>
<option value="Bloat">Bloat</option>
<option value="Active">Active</option>
<option value="Advanced">Advanced</option>
<option value="Skeleton">Skeleton</option>
</select>
<button onclick="addCase()">Add Case</button>
</div>

<div id="caseList"></div>
</div>

<!-- TIMELINE -->
<div id="timelinePage" class="hidden">
<div class="header">Decomposition Timeline</div>

<div class="card">
<div id="selectedCase">No case selected</div>
</div>
</div>

<!-- EVIDENCE -->
<div id="evidencePage" class="hidden">

<div class="card">
<input type="file" multiple onchange="handleUpload(event)">
</div>

<div class="gallery" id="gallery"></div>

</div>

</div>

<div id="viewer" onclick="this.style.display='none'">
<img id="viewerImg">
</div>

<script>
let currentCaseId = null;

// NAVIGATION
function showPage(p){
['casesPage','timelinePage','evidencePage'].forEach(id=>{
document.getElementById(id).classList.add('hidden');
});
document.getElementById(p+'Page').classList.remove('hidden');
}

// LOAD CASES
async function loadCases(){
const res = await fetch('/cases');
const data = await res.json();

caseList.innerHTML='';

data.forEach(c=>{
let div=document.createElement('div');
div.className='card';

div.innerHTML=`
<strong>${c.name}</strong>
<p>${c.details}</p>
<p>${c.stage}</p>
<button onclick="openCase('${c.id}')">Open</button>
`;

caseList.appendChild(div);
});
}

// ADD CASE
async function addCase(){
if(!caseName.value) return;

await fetch('/add-case',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:caseName.value,
details:caseDetails.value,
stage:caseStage.value
})
});

caseName.value='';
caseDetails.value='';

loadCases();
}

// OPEN CASE
async function openCase(id){
currentCaseId = id;

const res = await fetch('/case/'+id);
const c = await res.json();

selectedCase.innerHTML = `
<strong>${c.name}</strong><br>
${c.stage}<br>
${c.details}
`;

// LOAD EVIDENCE
gallery.innerHTML='';

c.evidence.forEach(e=>{
let div=document.createElement('div');
div.className='evidence-card';

let img=document.createElement('img');
img.src=e.url;
img.onclick=()=>openViewer(e.url);

div.appendChild(img);
gallery.appendChild(div);
});

showPage('timeline');
}

// UPLOAD FILES
async function handleUpload(e){
if(!currentCaseId){
alert("Select a case first");
return;
}

const form = new FormData();
for(let f of e.target.files){
form.append("images",f);
}

await fetch('/upload/'+currentCaseId,{
method:"POST",
body:form
});

openCase(currentCaseId);
}

// VIEWER
function openViewer(src){
viewer.style.display='flex';
viewerImg.src=src;
}

// INIT
window.onload = ()=>{
showPage('cases');
loadCases();
};
</script>

</body>
</html>
